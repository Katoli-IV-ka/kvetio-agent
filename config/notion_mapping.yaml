# Декларативный маппинг БД → Notion. Единственный рычаг настройки полей.
# direction: forward = БД авторитетна (БД→Notion); reverse = Notion авторитетен (Notion→БД).
# Чтобы добавить поле: дописать строку + `notion_sync.py --ensure-schema`.
# Чтобы убрать: удалить строку (свойство в Notion остаётся, если не --prune).

companies:
  notion_database_id_env: NOTION_COMPANIES_DB_ID
  db_table: companies
  db_key: domain
  db_status_filter: [qualified, enriched, sources_gathered, analyzed, dossier_ready]
  fields:
    # — Таблица (видимые колонки) ——————————————————————————————————————————
    - { db_column: name,             notion_property: "Company name",  notion_type: title,     direction: forward }
    - { db_column: icp_segment,      notion_property: "ICP Segment",   notion_type: select,    direction: forward }
    - { db_column: last_signal_date, notion_property: "Signal Date",   notion_type: date,      direction: forward }
    - { db_column: latest_signal,    notion_property: "Latest Signal", notion_type: rich_text, direction: forward }
    - { db_column: outreach_status,  notion_property: "Outreach",      notion_type: select,    direction: reverse }
    - { db_column: outreach_note,    notion_property: "Заметка",       notion_type: rich_text, direction: reverse }
    # — Страница (скрытые свойства, доступны при открытии карточки) ————————
    - { db_column: linkedin_url,     notion_property: "LinkedIn",      notion_type: url,       direction: forward }
    - { db_column: website,          notion_property: "Website",       notion_type: url,       direction: forward }

contacts:
  notion_database_id_env: NOTION_CONTACTS_DB_ID
  db_table: contacts
  db_key: id
  fields:
    - { db_column: full_name,       notion_property: "Full name",   notion_type: title,     direction: forward }
    - { db_column: company_domain,  notion_property: "Company",     notion_type: rich_text, direction: forward }
    - { db_column: title,           notion_property: "Title",       notion_type: rich_text, direction: forward }
    - { db_column: dm_priority,     notion_property: "DM priority", notion_type: number,    direction: forward }
    - { db_column: email,           notion_property: "Email",       notion_type: email,     direction: forward }
    - { db_column: email_status,    notion_property: "Email status",notion_type: select,    direction: forward }
    - { db_column: linkedin_url,    notion_property: "LinkedIn",    notion_type: url,       direction: forward }
    - { db_column: outreach_status, notion_property: "Outreach",    notion_type: select,    direction: reverse }
    - { db_column: outreach_note,   notion_property: "Note",        notion_type: rich_text, direction: reverse }
