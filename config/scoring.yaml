# Веса scoring (Stage 2). Любое изменение -> поднять version и rescore базу.
version: v0.1

thresholds:
  # На старте включаем shadow mode: ничего не auto-qualified, всё на Manual Review.
  # После 50 ручных меток — снижаем `qualified` до реального уровня (предположительно ~30).
  qualified: 999
  manual_review: 15

weights:
  training_intensity:
    wandb_active_runs: 5
    github_recent_train_scripts: 4
    research_papers: 3
    site_we_train: 3
    has_research_team: 3

  external_data_fit:
    job_keyword_training_data: 8        # вакансия упоминает training data / annotation / RLHF
    kaggle_sponsor: 6
    scale_ai_case_study: 7
    industry_high_data_need: 5          # medical / automotive / robotics / defense
    no_internal_annotation_team: 3

  commercial_readiness:
    funding_last_6m: 6
    funding_last_12m: 4
    series_a_or_higher: 4
    ml_team_5_to_20: 4
    company_age_1_to_4y: 2

  freshness:
    signal_within_30d: 5
    signal_within_90d: 3
    signal_within_180d: 1

  negative_flags:
    api_wrapper_only: 10
    ml_team_under_2: 5
    no_funding_no_growth: 3
    consumer_app_only: 4
