# Registry источников. Адаптеры читают эти настройки при инициализации.

sources:
  greenhouse:
    enabled: true
    tier: A
    rate_limit_rps: 1
    parser_version: "2026-04"
    description: "Greenhouse ATS — парсинг job-постингов"
    script: scripts/greenhouse.py
    supported_segments:
      - medical-imaging
      - autonomous-vehicles
      - speech-and-audio
    default_limit: 50
    # Greenhouse API не имеет глобального поиска — нужны slug'и компаний.
    # Стартовый список лежит в data/known_ats_slugs.csv.

  lever:
    enabled: false
    tier: A
    rate_limit_rps: 1
    parser_version: "2026-04"
    description: "Lever ATS — парсинг job-постингов"
    script: scripts/lever.py
    supported_segments:
      - medical-imaging
      - autonomous-vehicles
      - speech-and-audio
    default_limit: 50

  ashby:
    enabled: false
    tier: A
    rate_limit_rps: 1

  huggingface:
    enabled: true
    tier: A
    rate_limit_rps: 5
    parser_version: "2026-05"
    max_models_per_tag: 3000
    pipeline_tag_map:
      medical-imaging:
        - image-classification
        - image-segmentation
        - object-detection
      autonomous-vehicles:
        - object-detection
        - depth-estimation
        - image-segmentation
      speech-and-audio:
        - automatic-speech-recognition
        - text-to-speech
        - audio-classification
        - voice-activity-detection
      generative-ai:
        - text-generation
        - text2text-generation
        - conversational
        - summarization

  yc_browser:
    enabled: true
    tier: A
    rate_limit_rps: 2
    parser_version: "2026-05"
    description: "Y Combinator Company Browser — публичный JSON API (yc-oss/api)"
    script: scripts/yc_browser.py
    supported_segments:
      - medical-imaging
      - autonomous-vehicles
      - speech-and-audio
    default_limit: 100
    # Публичный yc-oss API. Данные обновляются ежедневно, авторизация не нужна.
    # Сегменты: medical-imaging, autonomous-vehicles, speech-and-audio

  github:
    enabled: true
    tier: A
    rate_limit_rps: 0.5
    parser_version: "2026-05"
    description: "GitHub Code Search — train.py + ICP keyword по организациям"
    script: scripts/github.py
    supported_segments:
      - medical-imaging
      - autonomous-vehicles
      - speech-and-audio
    default_limit: 50

  papers_with_code:
    enabled: true
    tier: A
    rate_limit_rps: 1
    cost: free
    description: "Papers with Code — implementation-backed research по имени компании (продуктовая секция)"
    script: scripts/enrichment.py
    max_results: 5

  techcrunch_rss:
    enabled: false
    tier: B

  arxiv:
    enabled: true
    tier: B
    rate_limit_rps: 1
    cost: free
    description: "arXiv API — недавние публикации по имени компании (R&D/технологии продукта). Name-match слабый → confidence low"
    script: scripts/enrichment.py
    max_results: 5

  wikidata:
    enabled: true
    tier: B
    cost: free
    rate_limit_rps: 2
    description: "Wikidata — дата основания, штаб-квартира, руководство, размер (секция «О компании»)"
    script: scripts/enrichment.py

  opencorporates:
    enabled: true
    tier: B
    cost: free
    rate_limit_rps: 1
    description: "OpenCorporates — юрлицо, юрисдикция, дата регистрации (секция «О компании»). Best-effort: анонимный доступ лимитирован"
    script: scripts/enrichment.py

  wayback:
    enabled: true
    tier: B
    cost: free
    description: "Wayback Machine — снапшоты сайта для динамики позиционирования"
    script: scripts/enrichment.py

  sec_edgar:
    enabled: false
    tier: A
    cost: free
    description: "SEC EDGAR — Form D (US private funding), CIK lookup (резолвер позже)"

  gdelt:
    enabled: false
    tier: B
    cost: free
    description: "GDELT — новостной граф, дедуп инфоповодов (резолвер позже)"

  gov_grants:
    enabled: false
    tier: B
    cost: free
    description: "NIH RePORTER + EU CORDIS — гранты (резолвер позже)"

  # ── Стабы на будущее (платные, tier C) ──────────────────────────
  linkedin:
    enabled: false
    tier: C
    cost: paid
    description: "STUB. Люди/команда. Реализовать resolve() после выбора провайдера."

  crunchbase:
    enabled: false
    tier: C
    cost: paid
    description: "STUB. Раунды/инвесторы/партнёры."

  similarweb:
    enabled: false
    tier: C
    cost: paid
    description: "STUB. Трафик / позиция на рынке."

  contact_page:
    enabled: true
    tier: A
    rate_limit_rps: 1
    description: "Corporate contact emails scraped from /contact pages"
    script: scripts/dm_contact_page.py

  contact_enricher:
    enabled: true
    tier: A
    description: "Email pattern guesser + Hunter.io verify + Twitter/site discovery"
    script: scripts/contact_enricher.py
    hunter_verify: false  # auto-enabled when HUNTER_API_KEY is present in .env
