# Маппинг «ICP-сегмент → типы данных» для Notion multi_select «Potential Data».
# Детерминированная эвристика. Меняется без правок кода и без деплоя.
#
# Используется profile builder'ом в notion_sync при forward-синке компаний.
# Логика: берём типы по segments[icp_segment], затем объединяем (union) с
# status_overrides[status], если статус компании совпал. Порядок сохраняется,
# дубли убираются.
#
# Полный набор значений ниже = опции, которые должны существовать в свойстве
# «Potential Data» (multi_select) в Notion-базе компаний.

segments:
  medical-imaging:      [Medical Data, Images, Annotation]
  video-photo-ai:       [video, Images, Annotation, Synthetic Data]
  speech-and-audio:     [Audio, Voice Data, Transcription]
  autonomous-vehicles:  [Images, Annotation, video, Camera Data, Sensor Data, Geospatial Data, Synthetic Data]
  robotics-ai:          [Images, Annotation, video, Synthetic Data, Camera Data, Sensor Data]
  agriculture-ai:       [Images, Annotation, Geospatial Data, Camera Data]
  generative-ai:        [Text, LLM Data, Human Feedback, Synthetic Data]

# Доп. правило по статусу компании. Объединяется с сегментными типами.
status_overrides:
  data_partner:         [Data Supplier]

# Поведение для неизвестного сегмента: пустой список (поле в Notion очищается).
# Это осознанный дефолт — лучше пусто, чем неверный тип данных.
